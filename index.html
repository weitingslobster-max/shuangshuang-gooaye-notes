  <style>
    :root { --bg:#0b1020; --panel:#111827; --ink:#e5edf7; --muted:#9fb0c5; --line:#2a3850; --accent:#f97316; --blue:#38bdf8; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; background:radial-gradient(circle at top left,#1e293b 0,#0b1020 42%,#060913 100%); color:var(--ink); font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","PingFang TC","Segoe UI",sans-serif; line-height:1.65; }
    main { max-width:960px; margin:0 auto; padding:48px 22px 80px; }
    header { border:1px solid var(--line); background:rgba(17,24,39,.82); border-radius:28px; padding:34px; margin-bottom:26px; }
    .eyebrow { color:#fed7aa; letter-spacing:.14em; text-transform:uppercase; font-size:13px; font-weight:700; }
    h1 { margin:8px 0 10px; font-size:38px; line-height:1.15; }
    .sub { color:var(--muted); font-size:18px; margin:0; }
    h2 { margin-top:34px; border-left:5px solid var(--accent); padding-left:12px; }
    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:16px; }
    .card { border:1px solid var(--line); background:rgba(17,24,39,.75); border-radius:20px; padding:20px; text-decoration:none; color:var(--ink); display:block; transition:.15s ease; }
    .card:hover { transform:translateY(-2px); border-color:var(--blue); }
    .episode { color:#fbbf24; font-weight:700; font-size:14px; letter-spacing:.05em; }
    .title { font-size:20px; font-weight:750; margin:8px 0; }
    .desc { color:var(--muted); margin:0; }
    footer { margin-top:44px; color:var(--muted); font-size:14px; }
  </style>
</head>
